<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة النسبة المئوية الاحترافية | احسب الزيادة والنقصان</title>
    <meta name="description" content="أفضل أداة لحساب النسبة المئوية أونلاين. احسب النسبة المئوية، مقدار الزيادة أو النقصان، والفرق بين الأرقام بدقة وسهولة.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
    <script src="/ads.js" defer></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="p-6 bg-white shadow-sm text-center">
        <a href="/" class="text-indigo-900 font-bold text-2xl">سؤال وجواب AI</a>
    </header>

    <main class="flex-grow max-w-2xl mx-auto p-6 my-10">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-indigo-50">
            <h1 class="text-2xl font-bold text-indigo-900 mb-6 text-center">حاسبة النسبة المئوية</h1>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">الرقم الأساسي</label>
                    <input type="number" id="num1" placeholder="مثال: 100" class="w-full p-3 border rounded-xl outline-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">النسبة المئوية (%)</label>
                    <input type="number" id="num2" placeholder="مثال: 20" class="w-full p-3 border rounded-xl outline-indigo-500">
                </div>
                
                <button onclick="calculate()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition">احسب النتيجة</button>
            </div>

            <div id="resultArea" class="hidden mt-8 p-6 bg-indigo-50 rounded-2xl text-center border border-indigo-100">
                <p class="text-gray-600 text-sm mb-2">النتيجة:</p>
                <p id="output" class="text-4xl font-bold text-indigo-900"></p>
            </div>
        </div>

        <article class="mt-12 bg-white p-8 rounded-2xl shadow border text-gray-700 leading-relaxed">
            <h2 class="text-xl font-bold mb-4">ماذا يمكن أن تحسب؟</h2>
            <ul class="list-disc pr-6 space-y-2">
                <li>حساب قيمة النسبة المئوية من أي رقم.</li>
                <li>حساب الزيادة المئوية (مثل زيادة الأسعار).</li>
                <li>حساب النقصان المئوي (مثل الخصومات).</li>
            </ul>
        </article>
    </main>

    <script>
        function calculate() {
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            
            if (isNaN(n1) || isNaN(n2)) return;

            const res = (n1 * n2) / 100;
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('output').innerText = res.toLocaleString();
        }
    </script>
</body>
</html>
