<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدوات تحرير النصوص الشاملة | سؤال وجواب AI</title>
    <meta name="description" content="أداة تحرير نصوص احترافية: عكس الكلام، تحويل حالة الحروف، تنظيف النصوص، وحساب الكلمات. أداة لا غنى عنها لكل كاتب.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
    <script src="/ads.js" defer></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="p-6 bg-white shadow-sm text-center">
        <a href="/" class="text-indigo-900 font-bold text-2xl">سؤال وجواب AI</a>
    </header>

    <main class="flex-grow max-w-4xl mx-auto p-6 my-10">
        <div class="bg-white p-8 rounded-3xl shadow-lg border border-indigo-50">
            <h1 class="text-2xl font-bold text-indigo-900 mb-6 text-center">أدوات تحرير النصوص</h1>
            
            <textarea id="textInput" placeholder="اكتب النص هنا..." class="w-full p-4 border rounded-xl mb-6 h-48 outline-indigo-500 text-lg"></textarea>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                <button onclick="reverseText()" class="bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700">عكس النص</button>
                <button onclick="cleanText()" class="bg-red-500 text-white p-3 rounded-lg hover:bg-red-600">تنظيف (إزالة مسافات)</button>
                <button onclick="copyText()" class="bg-green-600 text-white p-3 rounded-lg hover:bg-green-700">نسخ النص</button>
                <button onclick="clearAll()" class="bg-gray-500 text-white p-3 rounded-lg hover:bg-gray-600">مسح الكل</button>
            </div>

            <div class="p-4 bg-gray-100 rounded-xl text-center text-gray-700 font-bold" id="stats">
                عدد الكلمات: 0 | عدد الحروف: 0
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('textInput');
        const stats = document.getElementById('stats');

        input.addEventListener('input', () => {
            const text = input.value;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            stats.innerText = `عدد الكلمات: ${words} | عدد الحروف: ${text.length}`;
        });

        function reverseText() {
            input.value = input.value.split('').reverse().join('');
        }

        function cleanText() {
            // إزالة المسافات الزائدة وتحويل الأسطر الفارغة
            input.value = input.value.replace(/\s+/g, ' ').trim();
        }

        function copyText() {
            input.select();
            document.execCommand('copy');
            alert('تم نسخ النص!');
        }

        function clearAll() {
            input.value = '';
            stats.innerText = 'عدد الكلمات: 0 | عدد الحروف: 0';
        }
    </script>
</body>
</html>
