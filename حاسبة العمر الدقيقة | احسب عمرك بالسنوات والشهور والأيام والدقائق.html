<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر الدقيقة | احسب عمرك بالسنوات والشهور والأيام والدقائق</title>
    <meta name="description" content="احسب عمرك بدقة متناهية. أداة حاسبة العمر تحسب لك عمرك بالسنوات، الشهور، الأيام، وحتى الدقائق. سهلة وسريعة.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
    <script src="/ads.js" defer></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="p-6 bg-white shadow-sm text-center">
        <a href="/" class="text-indigo-900 font-bold text-2xl">سؤال وجواب AI</a>
    </header>

    <main class="flex-grow max-w-2xl mx-auto p-6 my-10">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-indigo-50">
            <h1 class="text-2xl font-bold text-indigo-900 mb-6 text-center">حاسبة العمر الدقيقة</h1>
            
            <label class="block text-sm font-bold text-gray-600 mb-2">تاريخ ميلادك:</label>
            <input type="date" id="birthdate" class="w-full p-4 border rounded-xl mb-6 text-xl outline-indigo-500">
            
            <button onclick="calculateAge()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition shadow-md text-lg">
                احسب العمر الآن
            </button>

            <div id="resultArea" class="hidden mt-8 space-y-3">
                <div class="p-4 bg-indigo-50 rounded-lg text-center">
                    <p class="text-gray-600 text-sm">العمر بالتفصيل:</p>
                    <p id="ageOutput" class="text-2xl font-bold text-indigo-900"></p>
                    <p id="minutesOutput" class="text-indigo-600 font-bold mt-2"></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function calculateAge() {
            const birthdate = new Date(document.getElementById('birthdate').value);
            const now = new Date();
            
            if (!birthdate || birthdate > now) return alert("يرجى اختيار تاريخ صحيح");

            let years = now.getFullYear() - birthdate.getFullYear();
            let months = now.getMonth() - birthdate.getMonth();
            let days = now.getDate() - birthdate.getDate();

            if (days < 0) {
                months--;
                days += new Date(now.getFullYear(), now.getMonth(), 0).getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            // حساب الفرق بالدقائق
            const diffTime = Math.abs(now - birthdate);
            const diffMinutes = Math.floor(diffTime / (1000 * 60));

            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('ageOutput').innerText = `${years} سنة، ${months} شهر، ${days} يوم`;
            document.getElementById('minutesOutput').innerText = `إجمالي الدقائق التي عشتها: ${diffMinutes.toLocaleString()} دقيقة`;
        }
    </script>
</body>
</html>
