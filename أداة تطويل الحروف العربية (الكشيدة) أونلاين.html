<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة تطويل الحروف العربية (الكشيدة) أونلاين</title>
    <meta name="description" content="أداة إضافة الكشيدة (التطويل) للنصوص العربية أونلاين. اجعل نصوصك تبدو أكثر جمالاً وتناسقاً بضغطة زر واحدة.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
        <script src="/ads.js" defer></script>

</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="p-6 bg-white shadow-sm text-center">
        <a href="/" class="text-indigo-900 font-bold text-2xl">سؤال وجواب AI</a>
    </header>

    <main class="flex-grow max-w-2xl mx-auto p-6 my-10">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-indigo-50">
            <h1 class="text-2xl font-bold text-indigo-900 mb-6 text-center">أداة تطويل الحروف (الكشيدة)</h1>
            
            <textarea id="inputText" placeholder="اكتب النص الذي تريد تطويله هنا..." class="w-full p-4 border rounded-xl mb-6 h-32 outline-indigo-500 text-lg"></textarea>
            
            <button onclick="addKashida()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition shadow-md text-lg">
                إضافة الكشيدة (التطويل)
            </button>

            <textarea id="outputText" readonly placeholder="النص المطول سيظهر هنا..." class="w-full p-4 mt-6 bg-gray-50 border rounded-xl h-32 text-lg font-bold text-indigo-800"></textarea>
            
            <button onclick="copyResult()" class="mt-4 w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">نسخ النص</button>
        </div>

        <article class="mt-12 bg-white p-8 rounded-2xl shadow border text-gray-700 leading-relaxed">
            <h2 class="text-xl font-bold mb-4">ما هي الكشيدة؟</h2>
            <p>الكشيدة أو "التطويل" هي عبارة عن خط أفقي يربط بين حروف الكلمة الواحدة في اللغة العربية، وتستخدم غالباً للزخرفة، تحسين الخط، أو موازنة أسطر النص في التصميم الطباعي.</p>
        </article>
    </main>

    <footer class="bg-white border-t py-8 text-center mt-auto">
        <p class="text-gray-500 text-sm">&copy; 2026 جميع الحقوق محفوظة - سؤال وجواب AI</p>
    </footer>

    <script>
        function addKashida() {
            const input = document.getElementById('inputText').value;
            const output = document.getElementById('outputText');
            
            // الحروف التي تقبل الكشيدة في اللغة العربية
            const kashidaChar = 'ـ';
            // نقوم بإضافة الكشيدة بين الحروف التي تقبل الاتصال
            // الحروف التي لا تقبل الكشيدة (بعدها) مثل: ا، د، ذ، ر، ز، و
            const result = input.replace(/([ابجحخدذرزسشصضطظعغفقكلمنهي])(?=[ابجحخدذرزسشصضطظعغفقكلمنهي])/gu, '$1' + kashidaChar);
            
            output.value = result;
        }

        function copyResult() {
            const output = document.getElementById('outputText');
            output.select();
            document.execCommand('copy');
            alert('تم نسخ النص المطول!');
        }
    </script>
</body>
</html>
