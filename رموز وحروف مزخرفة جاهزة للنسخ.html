<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رموز وحروف مزخرفة جاهزة للنسخ | سؤال وجواب AI</title>
    <meta name="description" content="أكبر مكتبة رموز وحروف مزخرفة جاهزة للنسخ. قلوب، نجوم، رموز ببجي، ورموز احترافية لأسماء السوشيال ميديا بضغطة زر.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
    <script src="/ads.js" defer></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="p-6 bg-white shadow-sm text-center">
        <a href="/" class="text-indigo-900 font-bold text-2xl">سؤال وجواب AI</a>
    </header>

    <main class="flex-grow max-w-4xl mx-auto p-6 my-10">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-indigo-50">
            <h1 class="text-2xl font-bold text-indigo-900 mb-2 text-center">رموز وحروف مزخرفة</h1>
            <p class="text-center text-gray-500 mb-8">اضغط على أي رمز لنسخه فوراً</p>
            
            <div id="symbolsGrid" class="grid grid-cols-4 md:grid-cols-8 gap-4 text-center">
                <!-- الرموز ستُولد هنا -->
            </div>
        </div>

        <article class="mt-12 bg-white p-8 rounded-2xl shadow border text-gray-700 leading-relaxed">
            <h2 class="text-xl font-bold mb-4">استخدامات الرموز:</h2>
            <p>تستخدم هذه الرموز لتزيين الأسماء الشخصية في فيسبوك، تويتر، إنستغرام، ولعبة ببجي (PUBG)، لتجعل حسابك مميزاً وفريداً.</p>
        </article>
    </main>

    <script>
        const symbols = [
            '❤', '♥', '✨', '🔥', '★', '⚡', '✿', '❀', '❃', '✔', '✘', '✦', '✧', '✪', '✫', '✬',
            'ஜ', 'ঔ', 'ღ', '❦', '❧', '☙', '⚝', '☪', '☮', '☯', '☸', '☹', '☺', '☻', '☼', '☽',
            '☾', '∞', '♪', '♫', '♬', '♩', '♭', '♮', '♯', '✈', '✉', '✌', '✍', '✎', '✏', '✂',
            '⚓', '☠', '☢', '☣', '♿', '⚠', '⚡', '⚖', '⚔', '🛡', '🗝', '✉', '✉', '✉', '✉', '✉'
        ];

        const grid = document.getElementById('symbolsGrid');
        
        symbols.forEach(sym => {
            const div = document.createElement('div');
            div.className = "p-4 bg-indigo-50 hover:bg-indigo-600 hover:text-white rounded-xl text-2xl cursor-pointer transition";
            div.innerText = sym;
            div.onclick = () => {
                navigator.clipboard.writeText(sym);
                alert("تم نسخ الرمز: " + sym);
            };
            grid.appendChild(div);
        });
    </script>
</body>
</html>
