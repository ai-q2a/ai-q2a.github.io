<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سؤال وجواب AI | موسوعة الذكاء الاصطناعي</title>
    <meta name="description" content="موسوعة سؤال وجواب AI، آلاف المقالات والإجابات الدقيقة من الذكاء الاصطناعي في كافة المجالات.">
        <script src="/ads.js" defer></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50">

    <header class="p-6 bg-white shadow-sm border-b">
        <h1 class="text-indigo-900 font-bold text-2xl text-center">سؤال وجواب AI</h1>
    </header>

    <main class="max-w-5xl mx-auto p-4">
        <!-- قسم البحث بالذكاء الاصطناعي -->
        <section class="bg-indigo-900 text-white py-12 rounded-2xl text-center my-8 shadow-xl">
            <h2 class="text-2xl font-bold mb-6">اسأل الذكاء الاصطناعي</h2>
            <div class="max-w-xl mx-auto px-4">
                <div class="bg-white p-2 rounded-full flex shadow-lg">
                    <input id="userInput" type="text" placeholder="اكتب سؤالك هنا..." class="w-full p-3 text-gray-700 outline-none rounded-r-full pr-6">
                    <button onclick="askAI()" id="askBtn" class="bg-indigo-600 px-8 rounded-full text-white font-bold hover:bg-indigo-500 transition">اسأل</button>
                </div>
            </div>
        </section>

        <article id="response" class="hidden max-w-4xl mx-auto my-6 p-8 bg-white rounded-xl shadow-sm border border-indigo-100 leading-relaxed text-gray-800">
        </article>

        <!-- قسم المقالات مع البحث الحي -->
        <section class="mt-16 mb-20">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="text-xl font-bold text-gray-800 border-r-4 border-indigo-600 pr-3">المقالات المتاحة</h2>
                <input type="text" id="searchArticles" onkeyup="filterArticles()" 
                       placeholder="🔍 ابحث في آلاف المقالات..." 
                       class="p-3 border border-gray-300 rounded-full w-full md:w-96 shadow-sm outline-indigo-500 pr-4">
            </div>
            
            <div id="repo-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <p class="text-gray-500 col-span-full text-center">جاري تحميل الموسوعة...</p>
            </div>
        </section>
    </main>

    <footer class="bg-white border-t py-8 text-center">
        <p class="text-gray-600 font-bold">سؤال وجواب AI &copy; 2026</p>
    </footer>

    <script>
        let allArticles = [];

        // دالة السؤال للذكاء الاصطناعي
        async function askAI() {
            const prompt = document.getElementById('userInput').value;
            const resDiv = document.getElementById('response');
            const btn = document.getElementById('askBtn');
            if(!prompt) return;
            resDiv.classList.remove('hidden');
            resDiv.innerText = "جاري التفكير...";
            btn.disabled = true;
            try {
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
                resDiv.innerText = await res.text();
            } catch (err) { resDiv.innerText = "حدث خطأ."; }
            finally { btn.disabled = false; }
        }

        // دالة جلب المقالات (مرة واحدة فقط)
        async function fetchArticles() {
            try {
                const res = await fetch(`https://api.github.com/repos/ai-q2a/ai-q2a.github.io/contents/`);
                const data = await res.json();
                allArticles = data.filter(item => item.name.endsWith('.html') && item.name !== "index.html");
                renderArticles(allArticles.slice(0, 15)); // عرض أول 15 مقالاً
            } catch(e) { 
                document.getElementById('repo-list').innerHTML = "<p class='text-red-500'>تعذر تحميل المقالات.</p>";
            }
        }

        // دالة العرض
        function renderArticles(articles) {
            const list = document.getElementById('repo-list');
            if(articles.length === 0) {
                list.innerHTML = "<p class='col-span-full text-center text-gray-500'>لا توجد نتائج تطابق بحثك.</p>";
                return;
            }
            list.innerHTML = articles.map(item => `
                <a href="${item.name}" class="block p-5 bg-white border border-gray-200 rounded-xl hover:border-indigo-500 hover:shadow-md transition">
                    <h3 class="font-bold text-indigo-900 truncate">${item.name.replace('.html', '').replace(/-/g, ' ')}</h3>
                    <span class="text-xs text-indigo-500 mt-2 block">اقرأ المزيد ←</span>
                </a>
            `).join('');
        }

        // دالة البحث الحي
        function filterArticles() {
            const query = document.getElementById('searchArticles').value.toLowerCase();
            const filtered = allArticles.filter(item => item.name.toLowerCase().includes(query));
            renderArticles(filtered.slice(0, 30)); // عرض حتى 30 نتيجة بحث
        }

        window.onload = fetchArticles;
    </script>
</body>
</html>
