<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سؤال وجواب AI | موسوعة الذكاء الاصطناعي</title>
    <meta name="description" content="استكشف موسوعة سؤال وجواب AI، مقالات شاملة وإجابات دقيقة من الذكاء الاصطناعي حول مختلف المجالات.">
    <script src="/ads.js" defer></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="p-6 bg-white shadow-sm border-b">
        <h1 class="text-indigo-900 font-bold text-2xl text-center">سؤال وجواب AI</h1>
    </header>

    <main class="flex-grow max-w-4xl mx-auto p-4 w-full">
        <!-- قسم البحث الذكي -->
        <section class="bg-indigo-900 text-white py-12 rounded-2xl text-center my-8 shadow-xl">
            <h2 class="text-2xl font-bold mb-6">اسأل الذكاء الاصطناعي الآن</h2>
            <div class="max-w-xl mx-auto px-4">
                <div class="bg-white p-2 rounded-full flex shadow-lg">
                    <input id="userInput" type="text" placeholder="اكتب سؤالك هنا..." class="w-full p-3 text-gray-700 outline-none rounded-r-full pr-6">
                    <button onclick="askAI()" id="askBtn" class="bg-indigo-600 px-8 rounded-full text-white font-bold hover:bg-indigo-500 transition">اسأل</button>
                </div>
            </div>
        </section>

        <!-- منطقة الرد المباشر -->
        <article id="response" class="hidden max-w-4xl mx-auto my-6 p-8 bg-white rounded-xl shadow-sm border border-indigo-100 leading-relaxed text-gray-800">
            <!-- سيظهر الرد هنا -->
        </article>

        <!-- منطقة المقالات التلقائية -->
        <section class="mb-16">
            <h2 class="text-xl font-bold mb-6 text-gray-800 border-r-4 border-indigo-600 pr-3">المقالات المتاحة</h2>
            <div id="repo-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-500">جاري تحميل المقالات...</p>
            </div>
        </section>
    </main>

    <!-- الفوتر -->
    <footer class="bg-white border-t py-8 text-center mt-auto">
        <div class="max-w-4xl mx-auto px-4">
            <p class="text-gray-600 font-bold text-lg mb-2">سؤال وجواب AI</p>
            <p class="text-gray-500 text-sm">
                &copy; 2026 جميع الحقوق محفوظة - منصة الذكاء الاصطناعي التفاعلية
            </p>
            <div class="mt-4 flex justify-center gap-4 text-indigo-600 text-sm font-semibold">
                <a href="/" class="hover:underline">الرئيسية</a>
                <span>|</span>
                <a href="#" class="hover:underline">سياسة الخصوصية</a>
            </div>
        </div>
    </footer>

    <script>
        // دالة السؤال للذكاء الاصطناعي
        async function askAI() {
            const prompt = document.getElementById('userInput').value;
            const resDiv = document.getElementById('response');
            const btn = document.getElementById('askBtn');
            
            if(!prompt) return;
            
            resDiv.classList.remove('hidden');
            resDiv.innerText = "جاري التفكير...";
            btn.disabled = true;
            
            try {
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
                const data = await res.text();
                resDiv.innerText = data;
            } catch (err) {
                resDiv.innerText = "حدث خطأ في الاتصال، حاول مرة أخرى.";
            } finally {
                btn.disabled = false;
            }
        }

        // دالة جلب المقالات (لجعلها روابط SEO مستقلة)
        async function fetchArticles() {
            const list = document.getElementById('repo-list');
            try {
                const res = await fetch(`https://api.github.com/repos/ai-q2a/ai-q2a.github.io/contents/`);
                const data = await res.json();
                list.innerHTML = "";
                
                data.forEach(item => {
                    // عرض ملفات HTML فقط (باستثناء index.html)
                    if(item.name.endsWith('.html') && item.name !== "index.html") {
                        const title = item.name.replace('.html', '').replace(/-/g, ' ');
                        list.innerHTML += `
                            <a href="${item.name}" class="block p-6 bg-white border border-gray-200 rounded-xl hover:border-indigo-500 hover:shadow-md transition">
                                <h3 class="font-bold text-lg text-indigo-900">${title}</h3>
                                <p class="text-gray-500 text-sm mt-2">اضغط للقراءة والتفاصيل...</p>
                            </a>
                        `;
                    }
                });
            } catch(e) { 
                list.innerHTML = "<p class='text-red-500'>تعذر تحميل المقالات.</p>";
            }
        }

        window.onload = fetchArticles;
    </script>
</body>
</html>
