<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">سؤال وجواب AI | اسأل الذكاء الاصطناعي</title>
    <meta id="meta-desc" name="description" content="منصة سؤال وجواب AI، احصل على إجابات فورية ودقيقة وتفسيرات شاملة.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="p-6 bg-white shadow-sm border-b sticky top-0 z-50">
        <h1 class="text-indigo-900 font-bold text-2xl text-center cursor-pointer" onclick="window.location.href='/'">سؤال وجواب AI</h1>
    </header>

    <main class="max-w-4xl mx-auto p-4" id="main-content">
        <!-- منطقة المحتوى -->
        <article id="content-area" class="mt-10 p-8 bg-white rounded-xl shadow-sm border border-gray-200">
            <div id="dynamic-content">
                <h2 class="text-3xl font-bold mb-6 text-indigo-900">مرحباً بك في موسوعة الذكاء الاصطناعي</h2>
                <input id="userInput" type="text" placeholder="اكتب سؤالك هنا..." class="w-full p-4 border rounded-full mb-4 shadow-sm">
                <button onclick="askAI()" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold hover:bg-indigo-700">اسأل الآن</button>
                
                <h3 class="text-xl font-bold mt-12 mb-6">الأقسام والمقالات:</h3>
                <div id="repo-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <p>جاري تحميل المقالات...</p>
                </div>
            </div>
        </article>
    </main>

    <script>
        // دالة تحديث بيانات SEO
        function updateSEO(title, desc) {
            document.getElementById('page-title').innerText = title + " | سؤال وجواب AI";
            document.getElementById('meta-desc').setAttribute('content', desc || "محتوى متخصص في سؤال وجواب AI");
        }

        async function loadContent(fileName) {
            const displayTitle = fileName.replace('.html', '').replace(/-/g, ' ');
            const url = `https://raw.githubusercontent.com/ai-q2a/ai-q2a.github.io/main/${encodeURIComponent(fileName)}`;
            
            const area = document.getElementById('dynamic-content');
            area.innerHTML = `<p class="text-center py-20">جاري تحميل ${displayTitle}...</p>`;
            
            try {
                const res = await fetch(url);
                const text = await res.text();
                area.innerHTML = `<button onclick="location.reload()" class="mb-6 text-indigo-600 font-bold">← العودة للرئيسية</button>
                                  <div class="prose max-w-none">${text}</div>`;
                updateSEO(displayTitle, "قراءة مقال حول " + displayTitle);
                window.history.pushState({}, '', `?q=${encodeURIComponent(fileName)}`);
            } catch (e) {
                area.innerHTML = `<p class="text-red-500">تعذر تحميل المقال.</p>`;
            }
        }

        async function fetchGitHubFiles() {
            const list = document.getElementById('repo-list');
            try {
                const response = await fetch(`https://api.github.com/repos/ai-q2a/ai-q2a.github.io/contents/`);
                const data = await response.json();
                list.innerHTML = ""; 
                data.forEach(item => {
                    if(item.name.endsWith('.html') && item.name !== 'index.html') {
                        const cleanName = item.name.replace('.html', '');
                        list.innerHTML += `
                            <button onclick="loadContent('${item.name}')" class="text-right p-4 bg-white border border-gray-200 rounded-lg hover:border-indigo-400 transition">
                                📄 ${cleanName}
                            </button>`;
                    }
                });
            } catch(e) { list.innerHTML = "تعذر تحميل القائمة."; }
        }

        // معالجة الرابط عند فتح الموقع مباشرة
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if(q) loadContent(q);
            else fetchGitHubFiles();
        };
    </script>
</body>
</html>
