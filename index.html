<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سؤال وجواب AI | مكتبة المحتوى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="p-6 bg-white shadow-sm border-b">
        <h1 class="text-indigo-900 font-bold text-2xl text-center cursor-pointer" onclick="location.reload()">سؤال وجواب AI</h1>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <!-- منطقة العرض (المحتوى سيظهر هنا) -->
        <article id="content-area" class="mt-10 p-8 bg-white rounded-xl shadow-sm border border-gray-200 min-h-[300px]">
            <h2 class="text-2xl font-bold mb-6">مرحباً بك!</h2>
            <p>اختر موضوعاً من الأسفل لقراءته، أو ابحث باستخدام الذكاء الاصطناعي في الأعلى.</p>
            
            <div class="mt-8">
                <input id="userInput" type="text" placeholder="اسأل الذكاء الاصطناعي..." class="w-full p-4 border rounded-full mb-4">
                <button onclick="askAI()" class="bg-indigo-600 text-white px-6 py-2 rounded-full">بحث</button>
            </div>
            
            <hr class="my-8">
            
            <h3 class="text-lg font-bold mb-4">الأقسام والمقالات المتاحة:</h3>
            <div id="repo-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p>جاري تحميل البيانات...</p>
            </div>
        </article>
    </main>

    <script>
        // دالة عرض محتوى ملف معين من GitHub
        async function loadContent(url, fileName) {
            const area = document.getElementById('content-area');
            area.innerHTML = `<p class="text-center">جاري تحميل "${fileName}"...</p>`;
            
            try {
                // جلب محتوى الملف كـ نص (Raw)
                const res = await fetch(url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/'));
                const text = await res.text();
                area.innerHTML = `<button onclick="location.reload()" class="mb-4 text-indigo-600">← العودة للرئيسية</button>
                                  <div class="prose max-w-none">${text}</div>`;
            } catch (e) {
                area.innerHTML = `<p class="text-red-500">حدث خطأ أثناء تحميل الملف.</p>`;
            }
        }

        // دالة جلب قائمة الملفات
        async function fetchGitHubFiles() {
            const url = `https://api.github.com/repos/ai-q2a/ai-q2a.github.io/contents/`;
            const list = document.getElementById('repo-list');
            try {
                const response = await fetch(url);
                const data = await response.json();
                list.innerHTML = ""; 
                data.forEach(item => {
                    if(item.name.endsWith('.html') && item.name !== 'index.html') {
                        list.innerHTML += `
                            <button onclick="loadContent('${item.html_url}', '${item.name}')" class="text-right p-4 bg-white border border-gray-200 rounded-lg hover:shadow-md transition">
                                📄 ${item.name.replace('.html', '')}
                            </button>`;
                    }
                });
            } catch(e) { list.innerHTML = "تعذر التحميل."; }
        }

        async function askAI() {
            const prompt = document.getElementById('userInput').value;
            const area = document.getElementById('content-area');
            if(!prompt) return;
            area.innerText = "جاري البحث...";
            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
            area.innerText = await res.text();
        }

        window.onload = fetchGitHubFiles;
    </script>
</body>
</html>
