<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سؤال وجواب AI | الرئيسية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Header -->
    <header class="p-6 bg-white shadow-sm border-b">
        <h1 class="text-indigo-900 font-bold text-2xl text-center">سؤال وجواب AI</h1>
    </header>

    <main>
        <!-- قسم البحث -->
        <section class="bg-indigo-900 text-white py-16 text-center">
            <h2 class="text-2xl md:text-3xl font-bold mb-8">موسوعة الإجابات الذكية.. اسأل الآن</h2>
            <div class="max-w-2xl mx-auto px-4">
                <div class="bg-white p-2 rounded-full flex shadow-lg">
                    <input id="userInput" type="text" placeholder="اكتب سؤالك هنا..." class="w-full p-4 text-gray-700 outline-none rounded-r-full pr-6">
                    <button onclick="askAI()" id="askBtn" class="bg-indigo-600 px-8 rounded-full text-white hover:bg-indigo-500 transition font-bold">اسأل</button>
                </div>
            </div>
        </section>

        <!-- منطقة الرد -->
        <article id="response" class="max-w-4xl mx-auto mt-10 p-8 bg-white rounded-xl shadow-sm border border-gray-200 min-h-[150px] leading-relaxed">
            أهلاً بك، ابدأ بطرح سؤالك ليقوم الذكاء الاصطناعي بالرد عليك فوراً.
        </article>

        <!-- قسم عرض ملفات ومجلدات GitHub -->
        <section class="max-w-4xl mx-auto mt-16 pb-20 px-4">
            <h2 class="text-xl font-bold mb-6 text-gray-800 border-r-4 border-indigo-600 pr-3">محتويات المستودع</h2>
            <div id="repo-list" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <p class="col-span-full text-gray-500 text-center">جاري جلب الملفات من المستودع...</p>
            </div>
        </section>
    </main>

    <script>
        // دالة السؤال للذكاء الاصطناعي
        async function askAI() {
            const prompt = document.getElementById('userInput').value;
            const resDiv = document.getElementById('response');
            if(!prompt) return;
            resDiv.innerText = "جاري التفكير...";
            try {
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
                resDiv.innerText = await res.text();
            } catch (err) { resDiv.innerText = "حدث خطأ في الاتصال."; }
        }

        // دالة جلب الملفات والمجلدات من GitHub
        async function fetchGitHubFiles() {
            const url = `https://api.github.com/repos/ai-q2a/ai-q2a.github.io/contents/`;
            const list = document.getElementById('repo-list');
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                list.innerHTML = ""; 
                
                // عرض جميع الملفات والمجلدات
                data.forEach(item => {
                    // استبعاد ملفات النظام والملف الرئيسي
                    if(item.name === "index.html" || item.name === ".git" || item.name === ".github" || item.name === "README.md") return;

                    const icon = item.type === "dir" ? "📁" : "📄";
                    
                    // الرابط هنا يوجه لصفحة الملف على GitHub مباشرة (لا يسبب 404)
                    list.innerHTML += `
                        <a href="${item.html_url}" target="_blank" class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:border-indigo-400 hover:shadow-md transition text-center block">
                            <span class="text-indigo-600 text-3xl mb-2 block">${icon}</span>
                            <span class="font-bold text-gray-700 text-sm break-words">${item.name}</span>
                        </a>
                    `;
                });
            } catch(e) { 
                list.innerHTML = "<p class='col-span-full text-red-500'>تعذر تحميل الملفات من المستودع.</p>";
            }
        }

        window.onload = fetchGitHubFiles;
    </script>
</body>
</html>
