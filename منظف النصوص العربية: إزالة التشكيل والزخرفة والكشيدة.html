<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظف النصوص العربية: إزالة التشكيل والزخرفة والكشيدة</title>
    <meta name="description" content="أداة تنظيف النصوص العربية أونلاين. احصل على نص خام وسليم بإزالة التشكيل، الزخارف، وعلامات الكشيدة بضغطة زر.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
    <script src="/ads.js" defer></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="p-6 bg-white shadow-sm text-center">
        <a href="/" class="text-indigo-900 font-bold text-2xl">سؤال وجواب AI</a>
    </header>

    <main class="flex-grow max-w-3xl mx-auto p-6 my-10">
        <div class="bg-white p-8 rounded-3xl shadow-lg border border-indigo-50">
            <h1 class="text-2xl font-bold text-indigo-900 mb-6 text-center">منظف النصوص العربية</h1>
            
            <textarea id="inputText" placeholder="ضع النص المشكل أو المزخرف هنا..." class="w-full p-4 border rounded-xl mb-6 h-48 outline-indigo-500 text-lg"></textarea>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                <button onclick="removeDiacritics()" class="bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 font-bold">إزالة التشكيل</button>
                <button onclick="removeTatweel()" class="bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 font-bold">إزالة الكشيدة</button>
                <button onclick="removeDecoration()" class="bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 font-bold">إزالة الزخرفة</button>
                <button onclick="cleanAll()" class="bg-red-600 text-white p-3 rounded-lg hover:bg-red-700 font-bold">تنظيف شامل (الكل)</button>
            </div>

            <textarea id="outputText" readonly placeholder="النص النظيف سيظهر هنا..." class="w-full p-4 bg-gray-50 border rounded-xl h-48 text-lg"></textarea>
        </div>

        <article class="mt-12 bg-white p-8 rounded-2xl shadow border text-gray-700 leading-relaxed">
            <h2 class="text-xl font-bold mb-4">لماذا تحتاج لتنظيف النصوص؟</h2>
            <p>تساعدك هذه الأداة في تحويل النصوص المعقدة إلى نصوص بسيطة وسهلة القراءة، كما تضمن توافق النصوص مع قواعد البيانات ومع محركات البحث (SEO) التي تفضل النصوص الخام دون تشكيل.</p>
        </article>
    </main>

    <script>
        const input = document.getElementById('inputText');
        const output = document.getElementById('outputText');

        // 1. إزالة التشكيل (حركات الفتحة، الضمة، الكسرة، السكون، التنوين)
        function removeDiacritics() {
            output.value = input.value.replace(/[\u0617-\u061A\u064B-\u0652]/g, '');
        }

        // 2. إزالة الكشيدة (التطويل)
        function removeTatweel() {
            output.value = input.value.replace(/[\u0640]/g, '');
        }

        // 3. إزالة الزخارف والحروف غير العادية
        function removeDecoration() {
            // إزالة الحروف غير الأساسية والرموز الغريبة
            output.value = input.value.replace(/[^\u0600-\u06FF\s\d]/g, '');
        }

        // 4. تنظيف شامل
        function cleanAll() {
            let val = input.value;
            val = val.replace(/[\u0617-\u061A\u064B-\u0652]/g, ''); // تشكيل
            val = val.replace(/[\u0640]/g, ''); // كشيدة
            val = val.replace(/[^\u0600-\u06FF\s\d]/g, ''); // زخرفة
            output.value = val;
        }
    </script>
</body>
</html>
