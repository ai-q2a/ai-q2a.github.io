<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كم باقي على عيد الأضحى؟ العد التنازلي المباشر</title>
    <meta name="description" content="كم يتبقى على عيد الأضحى المبارك؟ تابع العد التنازلي اللحظي لموعد عيد الأضحى لعام 2026 وما بعده بدقة عالية.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
    <script src="/ads.js" defer></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="p-6 bg-white shadow-sm text-center">
        <a href="/" class="text-indigo-900 font-bold text-2xl">سؤال وجواب AI</a>
    </header>

    <main class="flex-grow max-w-2xl mx-auto p-6 my-10">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-emerald-50 text-center">
            <h1 class="text-2xl font-bold text-emerald-800 mb-8">كم باقي على عيد الأضحى المبارك؟</h1>
            
            <div id="countdown" class="grid grid-cols-4 gap-2 mb-8">
                <div class="bg-emerald-600 text-white p-4 rounded-xl"><span id="days" class="text-3xl font-bold block">0</span>يوم</div>
                <div class="bg-emerald-500 text-white p-4 rounded-xl"><span id="hours" class="text-3xl font-bold block">0</span>ساعة</div>
                <div class="bg-emerald-400 text-white p-4 rounded-xl"><span id="minutes" class="text-3xl font-bold block">0</span>دقيقة</div>
                <div class="bg-emerald-300 text-white p-4 rounded-xl"><span id="seconds" class="text-3xl font-bold block">0</span>ثانية</div>
            </div>
            
            <p class="text-gray-600 font-bold">عيد أضحى مبارك مقدماً، أعاده الله عليكم باليمن والبركات</p>
        </div>
    </main>

    <footer class="bg-white border-t py-8 text-center mt-auto">
        <p class="text-gray-500 text-sm">&copy; 2026 جميع الحقوق محفوظة - سؤال وجواب AI</p>
    </footer>

    <script>
        // تواريخ تقريبية لوقفات عرفات (يوم عيد الأضحى هو اليوم التالي)
        const eidDates = {
            2026: "Jun 26, 2026",
            2027: "Jun 16, 2027",
            2028: "Jun 4, 2028",
            2029: "May 24, 2029",
            2030: "May 13, 2030"
        };

        function updateCountdown() {
            const now = new Date();
            let currentYear = now.getFullYear();
            let targetDate = new Date(eidDates[currentYear] || "Jun 26, 2026").getTime();

            // إذا مر العيد هذا العام، انتقل للسنة التالية
            if (targetDate - now.getTime() < 0) {
                targetDate = new Date(eidDates[currentYear + 1] || "Jun 26, 2026").getTime();
            }

            const distance = targetDate - now.getTime();

            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
