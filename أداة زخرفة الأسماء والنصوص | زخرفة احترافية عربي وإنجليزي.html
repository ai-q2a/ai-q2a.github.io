<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة زخرفة الأسماء والنصوص | زخرفة احترافية عربي وإنجليزي</title>
    <meta name="description" content="أفضل أداة لزخرفة الأسماء والنصوص العربية والإنجليزية أونلاين. احصل على نصوص مزخرفة ومميزة بضغطة زر.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
    <script src="/ads.js" defer></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="p-6 bg-white shadow-sm text-center">
        <a href="/" class="text-indigo-900 font-bold text-2xl">سؤال وجواب AI</a>
    </header>

    <main class="flex-grow max-w-2xl mx-auto p-6 my-10">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-indigo-50">
            <h1 class="text-2xl font-bold text-indigo-900 mb-6 text-center">زخرفة الأسماء والنصوص</h1>
            
            <input type="text" id="inputTxt" placeholder="اكتب النص للزخرفة..." class="w-full p-4 border rounded-xl mb-6 text-lg outline-indigo-500">
            
            <div id="results" class="space-y-3">
                <!-- النتائج ستظهر هنا -->
            </div>
        </div>

        <article class="mt-12 bg-white p-8 rounded-2xl shadow border text-gray-700 leading-relaxed">
            <h2 class="text-xl font-bold mb-4">مميزات أداة الزخرفة:</h2>
            <ul class="list-disc pr-6 space-y-2">
                <li>زخرفة احترافية للأسماء والكلمات.</li>
                <li>دعم كامل للغة العربية والإنجليزية.</li>
                <li>إمكانية نسخ الزخرفة بضغطة زر.</li>
            </ul>
        </article>
    </main>

    <script>
        const input = document.getElementById('inputTxt');
        const results = document.getElementById('results');

        const decorators = [
            (t) => "꧁" + t + "꧂",
            (t) => "★" + t + "★",
            (t) => "≋" + t + "≋",
            (t) => "✨" + t + "✨",
            (t) => "⚔" + t + "⚔",
            (t) => "࿓" + t + "࿓",
            (t) => "𝓐" + t + "𝓐", // مثال بسيط
            (t) => "〖" + t + "〗"
        ];

        input.addEventListener('input', () => {
            const val = input.value;
            if (!val) { results.innerHTML = ""; return; }
            
            results.innerHTML = decorators.map(d => `
                <div onclick="copyText(this)" class="p-3 bg-indigo-50 rounded-lg cursor-pointer hover:bg-indigo-100 text-center font-bold text-xl border border-indigo-200">
                    ${d(val)}
                </div>
            `).join('');
        });

        function copyText(el) {
            navigator.clipboard.writeText(el.innerText);
            alert("تم نسخ الزخرفة!");
        }
    </script>
</body>
</html>
