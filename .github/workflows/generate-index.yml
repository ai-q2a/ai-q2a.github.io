name: Generate Articles Index
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate articles.js
        run: |
          echo "const articleList = [" > articles.js
          find . -name "*.html" ! -name "index.html" -printf '"%f",\n' >> articles.js
          echo "];" >> articles.js

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add articles.js
          git commit -m "تحديث فهرس المقالات تلقائياً" || echo "لا توجد تغييرات"
          git push
