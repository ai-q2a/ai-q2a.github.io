<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كم باقي على رمضان؟ العد التنازلي لموعد شهر رمضان المبارك</title>
    <meta name="description" content="كم يتبقى على شهر رمضان المبارك؟ تابع العد التنازلي اللحظي لموعد حلول شهر رمضان المبارك لعام 2026 وما بعده بدقة عالية.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
    <script src="/ads.js" defer></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="p-6 bg-white shadow-sm text-center">
        <a href="/" class="text-indigo-900 font-bold text-2xl">سؤال وجواب AI</a>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-2xl mx-auto p-6 my-10">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-indigo-50 text-center">
            <h1 class="text-2xl font-bold text-indigo-900 mb-8">كم باقي على رمضان المبارك؟</h1>
            
            <div id="countdown" class="grid grid-cols-4 gap-2 mb-8">
                <div class="bg-indigo-600 text-white p-4 rounded-xl"><span id="days" class="text-3xl font-bold block">0</span>يوم</div>
                <div class="bg-indigo-500 text-white p-4 rounded-xl"><span id="hours" class="text-3xl font-bold block">0</span>ساعة</div>
                <div class="bg-indigo-400 text-white p-4 rounded-xl"><span id="minutes" class="text-3xl font-bold block">0</span>دقيقة</div>
                <div class="bg-indigo-300 text-white p-4 rounded-xl"><span id="seconds" class="text-3xl font-bold block">0</span>ثانية</div>
            </div>
            
            <p class="text-gray-600 font-bold">اللهم بلغنا رمضان لا فاقدين ولا مفقودين</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t py-8 text-center mt-auto">
        <p class="text-gray-500 text-sm">&copy; 2026 جميع الحقوق محفوظة - سؤال وجواب AI</p>
    </footer>

    <script>
        // مصفوفة تواريخ تقريبية لبداية رمضان (يمكنك تحديثها كل بضع سنوات)
        const ramadanDates = {
            2026: "Jan 15, 2026",
            2027: "Jan 4, 2027",
            2028: "Dec 24, 2028",
            2029: "Dec 13, 2029",
            2030: "Dec 2, 2030",
            2031: "Nov 21, 2031"
        };

        function updateCountdown() {
            const now = new Date();
            let currentYear = now.getFullYear();
            let targetDate = new Date(ramadanDates[currentYear] || "Jan 15, 2026").getTime();

            // إذا مر رمضان هذا العام، انتقل للسنة التالية
            if (targetDate - now.getTime() < 0) {
                targetDate = new Date(ramadanDates[currentYear + 1] || "Jan 15, 2026").getTime();
            }

            const distance = targetDate - now.getTime();

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;
        }

        // تحديث العد التنازلي كل ثانية
        setInterval(updateCountdown, 1000);
        updateCountdown(); // تشغيل فوري
    </script>
</body>
</html>
